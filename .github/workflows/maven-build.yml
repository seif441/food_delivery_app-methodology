name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up the Java environment (Corrected to use setup-java)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Build the backend project using Maven
    # This uses the --file flag to point to the pom.xml in your backend folder
    - name: Build with Maven
      run: mvn -B package --file backend/pom.xml